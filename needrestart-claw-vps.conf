# claw-vps: never auto-restart Firecracker microVM instances after apt operations.
# needrestart would otherwise restart firecracker@<vm> when the bundled firecracker
# binary is replaced on upgrade — hard-cutting every running guest. The VM lifecycle
# is owned by the `vm` CLI (systemd template), so upgrades must stay non-disruptive.
# Uses the autovivifying form so it does not clobber other needrestart overrides.
$nrconf{override_rc}->{qr(^firecracker@)} = 0;
